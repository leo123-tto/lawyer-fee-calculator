<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>五子棋 - 法律工具集</title>
<style>
/* ========== 设计系统变量（Claude风格） ========== */
:root {
    --parchment: #f5f4ed;
    --ivory: #faf9f5;
    --warm-sand: #e8e6dc;
    --brand: #c96442;
    --near-black: #141413;
    --olive-gray: #5e5d59;
    --stone-gray: #87867f;
    --border-cream: #f0eee6;
    --border-warm: #e8e6dc;
    --focus-blue: #3898ec;
    --charcoal: #4d4c48;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background: var(--parchment);
    color: var(--near-black);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 12px;
    padding-top: max(12px, env(safe-area-inset-top));
    padding-bottom: max(12px, env(safe-area-inset-bottom));
}

/* ========== 导航栏 ========== */
.nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    margin-bottom: 12px;
    background: var(--ivory);
    border: 1px solid var(--border-cream);
    border-radius: 8px;
    flex-shrink: 0;
}

.nav-title { font-size: 16px; font-weight: 500; }

.nav-back {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 6px 12px;
    font-size: 13px;
    color: var(--olive-gray);
    background: var(--warm-sand);
    border-radius: 6px;
    text-decoration: none;
}

.nav-back:hover { color: var(--near-black); }

/* ========== 主容器 ========== */
#app {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 460px;
    margin: 0 auto;
    width: 100%;
    background: var(--ivory);
    border: 1px solid var(--border-cream);
    border-radius: 8px;
    padding: 12px;
    overflow: hidden;
}

/* ========== 控制区 ========== */
.ctrls { text-align: center; margin-bottom: 8px; flex-shrink: 0; }

.ctrl-row {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 6px;
}

.mbtn {
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 500;
    border: 1px solid var(--border-warm);
    border-radius: 6px;
    background: var(--warm-sand);
    color: var(--charcoal);
    cursor: pointer;
    font-family: inherit;
}

.mbtn:hover { border-color: var(--brand); color: var(--brand); }
.mbtn.on { background: var(--brand); border-color: var(--brand); color: var(--ivory); }

.dbtn {
    padding: 4px 10px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid var(--border-warm);
    border-radius: 5px;
    background: transparent;
    color: var(--olive-gray);
    cursor: pointer;
    font-family: inherit;
}

.dbtn:hover { color: var(--near-black); }
.dbtn.on { background: var(--warm-sand); border-color: var(--brand); color: var(--brand); }

/* ========== 状态区 ========== */
#status {
    text-align: center;
    font-size: 13px;
    padding: 6px;
    color: var(--olive-gray);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    flex-shrink: 0;
}

.pdot {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 50%;
}

.pdot.bk { background: radial-gradient(circle at 35% 35%, #555, #222); border: 1px solid #444; }
.pdot.wh { background: radial-gradient(circle at 35% 35%, #fff, #ddd); border: 1px solid #bbb; }

.think::after { content: ''; animation: dots 1.2s steps(4,end) infinite; }
@keyframes dots { 0%{content:''} 25%{content:'.'} 50%{content:'..'} 75%{content:'...'} }

/* ========== 棋盘区 ========== */
#bwrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 200px;
}

#bcont {
    position: relative;
    width: 100%;
    max-width: 380px;
    aspect-ratio: 1;
    border-radius: 8px;
    background: linear-gradient(135deg, #e8e4d8, #ebe6da, #e5e0d5);
    border: 1px solid var(--border-warm);
}

#cv {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    touch-action: none;
    cursor: crosshair;
}

/* ========== 操作区 ========== */
.acts {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 10px 0 4px;
    flex-shrink: 0;
}

.abtn {
    padding: 8px 20px;
    font-size: 13px;
    font-weight: 500;
    border: 1px solid var(--border-warm);
    border-radius: 6px;
    background: var(--warm-sand);
    color: var(--charcoal);
    cursor: pointer;
    font-family: inherit;
}

.abtn:hover { border-color: var(--brand); color: var(--brand); }
.abtn:disabled { opacity: 0.4; cursor: not-allowed; }
.abtn.pri { background: var(--brand); border-color: var(--brand); color: var(--ivory); }

/* ========== 结果弹窗 ========== */
.ov {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(245,244,237,0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
}

.ov.show { opacity: 1; pointer-events: auto; }

.rcard {
    background: var(--ivory);
    border: 1px solid var(--border-cream);
    border-radius: 10px;
    padding: 24px 32px;
    text-align: center;
}

.rcard h2 { font-size: 18px; font-weight: 500; margin-bottom: 6px; }
.rcard p { font-size: 13px; color: var(--olive-gray); margin-bottom: 16px; }

/* ========== Toast ========== */
.toast {
    position: fixed;
    top: 18%;
    left: 50%;
    transform: translateX(-50%) translateY(-8px);
    background: var(--ivory);
    border: 1px solid var(--border-warm);
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.2s;
    pointer-events: none;
    z-index: 200;
}

.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<nav class="nav">
    <span class="nav-title">五子棋</span>
    <a href="index.html" class="nav-back">← 返回首页</a>
</nav>

<div id="app">
    <div class="ctrls">
        <div class="ctrl-row">
            <button class="mbtn on" data-m="single">单人模式</button>
            <button class="mbtn" data-m="dual">双人模式</button>
        </div>
        <div class="ctrl-row" id="drow">
            <button class="dbtn" data-d="easy">简单</button>
            <button class="dbtn on" data-d="medium">中等</button>
            <button class="dbtn" data-d="hard">困难</button>
        </div>
    </div>
    <div id="status">
        <span class="pdot bk" id="pdot"></span>
        <span id="stxt">黑方回合</span>
    </div>
    <div id="bwrap">
        <div id="bcont"><canvas id="cv"></canvas></div>
    </div>
    <div class="acts">
        <button class="abtn" id="ubtn" disabled>悔棋</button>
        <button class="abtn pri" id="nbtn">新局</button>
    </div>
</div>

<div class="ov" id="ov">
    <div class="rcard">
        <div id="ri" style="font-size:28px;margin-bottom:8px"></div>
        <h2 id="rt"></h2>
        <p id="rs"></p>
        <button class="abtn pri" id="abtn">再来一局</button>
    </div>
</div>
<div class="toast" id="tst"></div>

<script>
/* ========== 游戏常量 ========== */
const SZ = 15;
const STARS = [[3,3],[3,7],[3,11],[7,3],[7,7],[7,11],[11,3],[11,7],[11,11]];

/* ========== 游戏状态 ========== */
let board = [];
let cur = 1;
let hist = [];
let mode = 'single';
let diff = 'medium';
let over = false;
let winner = null;
let wline = null;
let aiTurn = false;
let hoverP = null;

/* ========== Canvas相关 ========== */
let canvas, ctx, bSize, pad, cs;

/* ========== 音效 ========== */
let actx;
function sfx(p) {
    try {
        if (!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
        if (actx.state==='suspended') actx.resume();
        const o = actx.createOscillator(), g = actx.createGain();
        o.type = 'sine';
        o.frequency.value = p===1 ? 500 : 700;
        g.gain.setValueAtTime(0.15, actx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime+0.1);
        o.connect(g); g.connect(actx.destination);
        o.start(); o.stop(actx.currentTime+0.1);
    } catch(e) {}
}
function sfxWin() {
    try {
        if (!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
        if (actx.state==='suspended') actx.resume();
        [523,659,784,1047].forEach((f,i) => {
            const o=actx.createOscillator(),g=actx.createGain();
            o.type='triangle'; o.frequency.value=f;
            g.gain.setValueAtTime(0.12,actx.currentTime+i*0.1);
            g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+i*0.1+0.2);
            o.connect(g); g.connect(actx.destination);
            o.start(actx.currentTime+i*0.1); o.stop(actx.currentTime+i*0.1+0.21);
        });
    } catch(e) {}
}
function sfxUndo() {
    try {
        if (!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
        if (actx.state==='suspended') actx.resume();
        const o=actx.createOscillator(),g=actx.createGain();
        o.type='sine'; o.frequency.setValueAtTime(400,actx.currentTime);
        o.frequency.exponentialRampToValueAtTime(200,actx.currentTime+0.08);
        g.gain.setValueAtTime(0.08,actx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.1);
        o.connect(g); g.connect(actx.destination);
        o.start(); o.stop(actx.currentTime+0.1);
    } catch(e) {}
}

/* ========== 初始化 ========== */
document.addEventListener('DOMContentLoaded', init);

function init() {
    canvas = document.getElementById('cv');
    ctx = canvas.getContext('2d');

    // 事件绑定
    document.querySelectorAll('.mbtn').forEach(b => b.onclick = () => setMode(b.dataset.m));
    document.querySelectorAll('.dbtn').forEach(b => b.onclick = () => setDiff(b.dataset.d));
    document.getElementById('ubtn').onclick = undo;
    document.getElementById('nbtn').onclick = newGame;
    document.getElementById('abtn').onclick = () => { closeOv(); newGame(); };

    canvas.addEventListener('pointerdown', onDown);
    canvas.addEventListener('pointermove', onMove);
    canvas.addEventListener('pointerleave', () => { hoverP = null; draw(); });

    window.addEventListener('resize', resize);

    resize();
    newGame();
}

function newGame() {
    board = Array(SZ).fill(null).map(() => Array(SZ).fill(0));
    cur = 1; hist = []; over = false; winner = null; wline = null; aiTurn = false; hoverP = null;
    closeOv();
    updateUI();
    draw();
}

function resize() {
    const cont = document.getElementById('bcont');
    const rect = cont.getBoundingClientRect();
    const sz = Math.min(rect.width, rect.height) || 300;

    const dpr = window.devicePixelRatio || 1;
    canvas.width = sz * dpr;
    canvas.height = sz * dpr;
    canvas.style.width = sz + 'px';
    canvas.style.height = sz + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    bSize = sz;
    pad = sz * 0.055;
    cs = (sz - pad * 2) / (SZ - 1);
    draw();
}

/* ========== UI更新 ========== */
function updateUI() {
    const dot = document.getElementById('pdot');
    const txt = document.getElementById('stxt');
    const uBtn = document.getElementById('ubtn');

    dot.className = 'pdot ' + (cur===1 ? 'bk' : 'wh');

    if (over) {
        txt.textContent = winner===1 ? '黑方获胜' : winner===2 ? '白方获胜' : '平局';
        txt.classList.remove('think');
    } else if (aiTurn) {
        txt.textContent = 'AI思考中';
        txt.classList.add('think');
    } else {
        txt.textContent = mode==='single' ? (cur===1 ? '你的回合' : 'AI回合') : (cur===1 ? '黑方回合' : '白方回合');
        txt.classList.remove('think');
    }

    uBtn.disabled = hist.length===0 || aiTurn || over;
}

/* ========== 模式/难度 ========== */
function setMode(m) {
    mode = m;
    document.querySelectorAll('.mbtn').forEach(b => b.classList.toggle('on', b.dataset.m===m));
    document.getElementById('drow').style.display = m==='single' ? 'flex' : 'none';
    newGame();
}

function setDiff(d) {
    diff = d;
    document.querySelectorAll('.dbtn').forEach(b => b.classList.toggle('on', b.dataset.d===d));
    newGame();
}

/* ========== 绘制 ========== */
function draw() {
    if (!ctx || !bSize) return;

    const s = bSize, p = pad, c = cs;

    // 棋盘背景
    ctx.fillStyle = '#e8e4d8';
    ctx.fillRect(0, 0, s, s);

    // 网格线
    ctx.strokeStyle = 'rgba(90,85,75,0.35)';
    ctx.lineWidth = 1;
    for (let i=0; i<SZ; i++) {
        const v = p + i*c;
        ctx.beginPath(); ctx.moveTo(p, v); ctx.lineTo(p+(SZ-1)*c, v); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(v, p); ctx.lineTo(v, p+(SZ-1)*c); ctx.stroke();
    }

    // 外框
    ctx.strokeStyle = 'rgba(90,85,75,0.5)';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(p, p, (SZ-1)*c, (SZ-1)*c);

    // 星位
    ctx.fillStyle = 'rgba(90,85,75,0.6)';
    STARS.forEach(([r,co]) => {
        ctx.beginPath();
        ctx.arc(p+co*c, p+r*c, c*0.1, 0, Math.PI*2);
        ctx.fill();
    });

    // 坐标
    ctx.fillStyle = 'rgba(90,85,75,0.4)';
    ctx.font = (c*0.28) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (let i=0; i<SZ; i++) {
        ctx.fillText(String.fromCharCode(65+i), p+i*c, p-c*0.45);
        ctx.fillText(String(SZ-i), p-c*0.45, p+i*c);
    }

    // 棋子
    for (let r=0; r<SZ; r++) for (let co=0; co<SZ; co++) if (board[r][co]) drawPc(r, co, board[r][co]);

    // 最后落子标记
    if (hist.length && !over) {
        const last = hist[hist.length-1];
        ctx.fillStyle = '#c96442';
        ctx.beginPath();
        ctx.arc(p+last.c*c, p+last.r*c, c*0.12, 0, Math.PI*2);
        ctx.fill();
    }

    // 悬停预览
    if (hoverP && !over && !aiTurn && board[hoverP.r][hoverP.c]===0) {
        drawPc(hoverP.r, hoverP.c, cur, 0.3);
    }

    // 胜利线
    if (wline) {
        ctx.strokeStyle = 'rgba(201,100,66,0.6)';
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(p+wline[0][1]*c, p+wline[0][0]*c);
        ctx.lineTo(p+wline[wline.length-1][1]*c, p+wline[wline.length-1][0]*c);
        ctx.stroke();
    }
}

function drawPc(r, co, pl, alpha=1) {
    const p = pad, c = cs;
    const x = p+co*c, y = p+r*c, rad = c*0.42;

    ctx.save();
    ctx.globalAlpha = alpha;

    if (alpha>=1) {
        ctx.shadowColor = 'rgba(0,0,0,0.2)';
        ctx.shadowBlur = rad*0.15;
        ctx.shadowOffsetY = rad*0.05;
    }

    const g = ctx.createRadialGradient(x-rad*0.3, y-rad*0.3, rad*0.1, x, y, rad);
    if (pl===1) {
        g.addColorStop(0, '#555');
        g.addColorStop(0.6, '#333');
        g.addColorStop(1, '#222');
    } else {
        g.addColorStop(0, '#fff');
        g.addColorStop(0.6, '#f0f0f0');
        g.addColorStop(1, '#d5d5d5');
    }

    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(x, y, rad, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
}

/* ========== 坐标转换 ========== */
function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (bSize / rect.width);
    const y = (e.clientY - rect.top) * (bSize / rect.height);
    const co = Math.round((x - pad) / cs);
    const r = Math.round((y - pad) / cs);
    if (r>=0 && r<SZ && co>=0 && co<SZ) return {r, c: co};
    return null;
}

/* ========== 事件处理 ========== */
function onDown(e) {
    e.preventDefault();
    if (over || aiTurn) return;

    const pos = getPos(e);
    if (!pos || board[pos.r][pos.c]!==0) return;

    place(pos.r, pos.c);
}

function onMove(e) {
    const pos = getPos(e);
    if (pos && (!hoverP || hoverP.r!==pos.r || hoverP.c!==pos.c)) {
        hoverP = pos;
        draw();
    } else if (!pos && hoverP) {
        hoverP = null;
        draw();
    }
}

/* ========== 落子 ========== */
function place(r, c) {
    board[r][c] = cur;
    hist.push({r, c, p: cur});
    sfx(cur);

    const w = checkWin(r, c, cur);
    if (w) {
        over = true; winner = cur; wline = w;
        sfxWin();
        draw(); updateUI();
        setTimeout(showResult, 500);
        return;
    }

    if (hist.length === SZ*SZ) {
        over = true; winner = 0;
        draw(); updateUI();
        setTimeout(showResult, 300);
        return;
    }

    cur = 3 - cur;
    draw(); updateUI();

    if (mode==='single' && cur===2 && !over) {
        aiTurn = true;
        updateUI();
        setTimeout(aiMove, diff==='easy'?250:diff==='medium'?400:600);
    }
}

/* ========== 悔棋 ========== */
function undo() {
    if (!hist.length || aiTurn || over) return;

    if (mode==='single' && hist.length>=2 && hist[hist.length-1].p===2) {
        let m = hist.pop(); board[m.r][m.c] = 0;
        m = hist.pop(); board[m.r][m.c] = 0;
        cur = 1;
    } else {
        let m = hist.pop(); board[m.r][m.c] = 0; cur = m.p;
    }

    sfxUndo();
    wline = null;
    draw(); updateUI();
    toast('已悔棋');
}

/* ========== 胜负判定 ========== */
function checkWin(r, c, pl) {
    const dirs = [[0,1],[1,0],[1,1],[1,-1]];
    for (let [dr,dc] of dirs) {
        let line = [[r,c]];
        let nr=r+dr, nc=c+dc;
        while (nr>=0 && nr<SZ && nc>=0 && nc<SZ && board[nr][nc]===pl) {
            line.push([nr,nc]); nr+=dr; nc+=dc;
        }
        nr=r-dr; nc=c-dc;
        while (nr>=0 && nr<SZ && nc>=0 && nc<SZ && board[nr][nc]===pl) {
            line.unshift([nr,nc]); nr-=dr; nc-=dc;
        }
        if (line.length>=5) return line;
    }
    return null;
}

/* ========== AI ========== */
function aiMove() {
    if (over) { aiTurn=false; return; }

    let cands = getCands();
    let mv;

    // 检查获胜
    for (let p of cands) {
        board[p.r][p.c] = 2;
        if (checkWin(p.r,p.c,2)) { board[p.r][p.c]=0; mv=p; break; }
        board[p.r][p.c] = 0;
    }
    if (mv) { aiTurn=false; place(mv.r,mv.c); return; }

    // 检查对手获胜
    for (let p of cands) {
        board[p.r][p.c] = 1;
        if (checkWin(p.r,p.c,1)) { board[p.r][p.c]=0; mv=p; break; }
        board[p.r][p.c] = 0;
    }
    if (mv) { aiTurn=false; place(mv.r,mv.c); return; }

    // 评估
    let best=null, bestS=-1e9;
    for (let p of cands) {
        let s = evalPt(p.r,p.c,2) + evalPt(p.r,p.c,1)*(diff==='hard'?0.95:diff==='medium'?0.85:0.6);
        s += Math.random()*2;
        if (s>bestS) { bestS=s; best=p; }
    }

    aiTurn=false;
    if (best) place(best.r,best.c);
}

function getCands() {
    let set = new Set();
    for (let r=0; r<SZ; r++) for (let c=0; c<SZ; c++) if (board[r][c]) {
        for (let dr=-2; dr<=2; dr++) for (let dc=-2; dc<=2; dc++) {
            let nr=r+dr, nc=c+dc;
            if (nr>=0 && nr<SZ && nc>=0 && nc<SZ && !board[nr][nc]) set.add(nr*SZ+nc);
        }
    }
    if (!set.size) return [{r:7,c:7}];
    return [...set].map(v=>({r:Math.floor(v/SZ),c:v%SZ}));
}

function evalPt(r, c, pl) {
    let score=0;
    const dirs = [[0,1],[1,0],[1,1],[1,-1]];
    board[r][c] = pl;
    for (let [dr,dc] of dirs) {
        let cnt=1, open=0;
        let nr=r+dr, nc=c+dc;
        while (nr>=0&&nr<SZ&&nc>=0&&nc<SZ&&board[nr][nc]===pl) {cnt++;nr+=dr;nc+=dc;}
        if (nr>=0&&nr<SZ&&nc>=0&&nc<SZ&&!board[nr][nc]) open++;
        nr=r-dr; nc=c-dc;
        while (nr>=0&&nr<SZ&&nc>=0&&nc<SZ&&board[nr][nc]===pl) {cnt++;nr-=dr;nc-=dc;}
        if (nr>=0&&nr<SZ&&nc>=0&&nc<SZ&&!board[nr][nc]) open++;
        if (cnt>=5) score+=1e5;
        else if (cnt===4 && open===2) score+=5e4;
        else if (cnt===4) score+=5e3;
        else if (cnt===3 && open===2) score+=5e3;
        else if (cnt===3) score+=500;
        else if (cnt===2 && open===2) score+=500;
        else if (cnt===2) score+=50;
    }
    board[r][c] = 0;
    return score;
}

/* ========== 结果弹窗 ========== */
function showResult() {
    const ri=document.getElementById('ri'), rt=document.getElementById('rt'), rs=document.getElementById('rs');
    if (winner===1) {
        ri.innerHTML='<span class="pdot bk" style="width:22px;height:22px;display:inline-block"></span>';
        rt.textContent = mode==='single' ? '你赢了' : '黑方获胜';
        rs.textContent = mode==='single' ? '恭喜！' : '五子连珠';
    } else if (winner===2) {
        ri.innerHTML='<span class="pdot wh" style="width:22px;height:22px;display:inline-block"></span>';
        rt.textContent = mode==='single' ? 'AI获胜' : '白方获胜';
        rs.textContent = mode==='single' ? '再接再厉' : '五子连珠';
    } else {
        ri.textContent='平';
        rt.textContent='平局';
        rs.textContent='旗鼓相当';
    }
    document.getElementById('ov').classList.add('show');
}

function closeOv() { document.getElementById('ov').classList.remove('show'); }

/* ========== Toast ========== */
let toastTmr;
function toast(m) {
    const t=document.getElementById('tst');
    t.textContent=m; t.classList.add('show');
    clearTimeout(toastTmr);
    toastTmr=setTimeout(()=>t.classList.remove('show'),1200);
}
</script>
